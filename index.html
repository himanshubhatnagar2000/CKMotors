<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/src/assets/images/favicon/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CK Motors | Authorized Tata Motors Showroom</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Hidden Google Translate Element -->
  <div id="google_translate_element" style="display:none"></div>
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,hi',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }

    // Automatically hide Google Translate top frame banner and prevent body top displacement
    const observer = new MutationObserver(function () {
      if (document.body.style.top !== '0px' && document.body.style.top !== '') {
        document.body.style.top = '0px';
      }
      const frame = document.querySelector('.goog-te-banner-frame, iframe[id*=":1.container"], .VIpgJd-yD0eb-LgAxNu-wT1Twb');
      if (frame) {
        frame.style.display = 'none';
        frame.style.visibility = 'hidden';
        frame.style.height = '0px';
      }
    });
    observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true });
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
